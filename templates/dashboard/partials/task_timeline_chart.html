<div class="card">
  <div class="flex justify-between items-center mb-4">
    <h3 class="text-lg font-semibold text-sand-800 dark:text-sand-200">Opgave Tidslinje</h3>
    <a href="{% url 'tasks:task-list' %}" class="text-sm text-sand-600 hover:text-sand-800 dark:text-sand-400 dark:hover:text-sand-200">
      Se alle &rarr;
    </a>
  </div>
  <div id="task-timeline-container" style="min-height: 200px;">
    <canvas id="taskTimelineChart"></canvas>
  </div>
</div>

<!-- Date adapter for Chart.js time scale -->
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3/dist/chartjs-adapter-date-fns.bundle.min.js"></script>

<script>
(function() {
  setTimeout(function() {
    fetch('{% url "dashboard:api-task-timeline-data" %}', { credentials: 'same-origin' })
    .then(function(response) {
      if (!response.ok) throw new Error('HTTP ' + response.status);
      return response.json();
    })
    .then(function(data) {
      var container = document.getElementById('task-timeline-container');

      if (!data.tasks || data.tasks.length === 0) {
        container.innerHTML =
          '<p class="text-center text-sand-500 dark:text-sand-400 py-8">Ingen aktive opgaver</p>';
        return;
      }

      // Filter to tasks that have both planned_start and planned_end
      var tasks = data.tasks.filter(function(t) {
        return t.planned_start && t.planned_end;
      });

      if (tasks.length === 0) {
        container.innerHTML =
          '<p class="text-center text-sand-500 dark:text-sand-400 py-8">Ingen opgaver med planlagte datoer</p>';
        return;
      }

      // Sort by planned_start date
      tasks.sort(function(a, b) {
        return new Date(a.planned_start) - new Date(b.planned_start);
      });

      // Status color mapping
      var statusColors = {
        todo:     '#9CA3AF',
        doing:    '#3B82F6',
        paused:   '#EAB308',
        testing:  '#8B5CF6',
        approval: '#F97316',
        complete: '#22C55E'
      };

      // Status display names
      var statusLabels = {
        todo:     'Todo',
        doing:    'I gang',
        paused:   'Pause',
        testing:  'Test',
        approval: 'Godkendelse',
        complete: 'Færdig'
      };

      // Build labels (task titles)
      var labels = tasks.map(function(t) { return t.title; });

      // Build time segments per task from state_changes
      var taskSegments = tasks.map(function(t) {
        var segments = [];
        var changes = (t.state_changes || []).slice().sort(function(a, b) {
          return new Date(a.changed_at) - new Date(b.changed_at);
        });

        var start = new Date(t.planned_start).getTime();
        var end = new Date(t.planned_end).getTime();

        // For completed tasks, end the bar at the completion date
        if (t.status === 'complete') {
          for (var c = changes.length - 1; c >= 0; c--) {
            if (changes[c].to_state === 'complete') {
              end = new Date(changes[c].changed_at).getTime();
              break;
            }
          }
        }

        if (changes.length === 0) {
          // No state changes — single segment with current status
          segments.push({ state: t.status, start: start, end: end });
        } else {
          // First segment: from planned_start to first state change
          var firstChangeTime = new Date(changes[0].changed_at).getTime();
          if (firstChangeTime > start) {
            segments.push({
              state: changes[0].from_state || t.status,
              start: start,
              end: Math.min(firstChangeTime, end)
            });
          }

          // Segments between state changes
          for (var i = 0; i < changes.length; i++) {
            var segStart = new Date(changes[i].changed_at).getTime();
            var segEnd = (i + 1 < changes.length)
              ? new Date(changes[i + 1].changed_at).getTime()
              : end;
            if (segStart < end) {
              segments.push({
                state: changes[i].to_state,
                start: Math.max(segStart, start),
                end: Math.min(segEnd, end)
              });
            }
          }
        }

        return segments;
      });

      // Create datasets: one per segment slot, colored by state
      var maxSegments = Math.max.apply(null, taskSegments.map(function(s) { return s.length; }));
      var datasets = [];
      for (var s = 0; s < maxSegments; s++) {
        var segData = [];
        var segColors = [];
        for (var t = 0; t < tasks.length; t++) {
          if (s < taskSegments[t].length) {
            var seg = taskSegments[t][s];
            segData.push([seg.start, seg.end]);
            segColors.push(statusColors[seg.state] || '#9CA3AF');
          } else {
            segData.push(null);
            segColors.push('transparent');
          }
        }
        datasets.push({
          data: segData,
          backgroundColor: segColors,
          borderRadius: 2,
          borderSkipped: false,
          barPercentage: 0.6,
          categoryPercentage: 0.8
        });
      }

      // Adjust container height based on number of tasks
      var chartHeight = Math.max(200, tasks.length * 45 + 80);
      container.style.height = chartHeight + 'px';

      // Theme-aware colors
      var isDark = document.documentElement.classList.contains('dark');
      var gridColor = isDark ? 'rgba(180, 172, 154, 0.1)' : 'rgba(107, 99, 91, 0.1)';
      var textColor = isDark ? '#D4CCC0' : '#6B635B';

      var ctx = document.getElementById('taskTimelineChart').getContext('2d');
      new Chart(ctx, {
        type: 'bar',
        data: {
          labels: labels,
          datasets: datasets
        },
        options: {
          indexAxis: 'y',
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: {
              display: true,
              position: 'bottom',
              labels: {
                color: textColor,
                generateLabels: function() {
                  var keys = Object.keys(statusColors);
                  return keys.map(function(key) {
                    return {
                      text: statusLabels[key] || key,
                      fillStyle: statusColors[key],
                      strokeStyle: statusColors[key],
                      lineWidth: 0,
                      borderRadius: 2
                    };
                  });
                }
              }
            },
            tooltip: {
              backgroundColor: isDark ? '#4A4540' : '#FFFFFF',
              titleColor: isDark ? '#F0EDE8' : '#2C2825',
              bodyColor: isDark ? '#D4CCC0' : '#4A4540',
              borderColor: isDark ? '#6B635B' : '#E5E0D8',
              borderWidth: 1,
              callbacks: {
                title: function(items) {
                  if (!items.length) return '';
                  return tasks[items[0].dataIndex].title;
                },
                label: function(context) {
                  var taskIdx = context.dataIndex;
                  var segIdx = context.datasetIndex;
                  var task = tasks[taskIdx];
                  if (!task) return '';
                  var seg = taskSegments[taskIdx][segIdx];
                  if (!seg) return '';
                  var lines = [];
                  var fmtDate = function(ms) {
                    var d = new Date(ms);
                    return d.toLocaleDateString('da-DK', { day: 'numeric', month: 'short', year: 'numeric' });
                  };
                  lines.push('Status: ' + (statusLabels[seg.state] || seg.state));
                  lines.push('Fra: ' + fmtDate(seg.start));
                  lines.push('Til: ' + fmtDate(seg.end));
                  if (task.assignees && task.assignees.length > 0) {
                    lines.push('Tildelt: ' + task.assignees.join(', '));
                  }
                  if (task.approvers && task.approvers.length > 0) {
                    lines.push('Godkendere: ' + task.approvers.join(', '));
                  }
                  return lines;
                }
              }
            }
          },
          scales: {
            x: {
              type: 'time',
              min: new Date(tasks[0].planned_start).getTime(),
              time: {
                unit: 'week',
                tooltipFormat: 'dd MMM yyyy',
                displayFormats: {
                  week: 'dd MMM',
                  month: 'MMM yyyy'
                }
              },
              grid: {
                color: gridColor
              },
              ticks: {
                color: textColor,
                maxRotation: 45,
                autoSkip: true,
                maxTicksLimit: 15
              }
            },
            y: {
              grid: {
                display: false
              },
              ticks: {
                color: textColor,
                font: { size: 12 },
                // Truncate long task titles
                callback: function(value, index) {
                  var label = labels[index];
                  return label && label.length > 40 ? label.substring(0, 37) + '...' : label;
                }
              }
            }
          },
          onClick: function(event, elements) {
            if (elements.length > 0) {
              var task = tasks[elements[0].index];
              if (task && task.id) {
                window.location.href = '/tasks/' + task.id + '/';
              }
            }
          },
          onHover: function(event, elements) {
            event.native.target.style.cursor = elements.length > 0 ? 'pointer' : 'default';
          }
        }
      });
    })
    .catch(function(error) {
      console.error('Error loading task timeline data:', error);
      document.getElementById('task-timeline-container').innerHTML =
        '<p class="text-center text-sand-500 dark:text-sand-400 py-8">Kunne ikke indlæse data</p>';
    });
  }, 50);
})();
</script>
